```html id="btn20"
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>20 Tài Khoản</title>

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:-apple-system;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  padding:20px;
}

button {
  padding:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.counter {
  font-size:30px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🚀 20 Tài Khoản</h2>

<div class="counter">Đã mở: <span id="count">0</span></div>

<div class="grid" id="list"></div>

<script>
let total = 0;

function openAcc(n){
  total++;
  document.getElementById("count").innerText = total;

  window.open(
    "https://6cc.cz?acc=" + n + "&id=" + Date.now(),
    "_blank"
  );
}

// tạo 20 nút
const list = document.getElementById("list");

for(let i=1;i<=20;i++){
  const btn = document.createElement("button");
  btn.innerText = i + " tài khoản";
  btn.onclick = () => openAcc(i);
  list.appendChild(btn);
}
</script>

</body>
</html>
