<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone app -->
<meta name="apple-mobile-web-app-title" content="ACC TOOL">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- icon -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">

<title>ACC TOOL</title>

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:-apple-system;
}

button {
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:12px;
  margin:10px;
  font-weight:bold;
}

.run { background:#22c55e; color:white; }
.reset { background:#ef4444; color:white; }

.counter {
  font-size:40px;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>🚀 ACC TOOL</h2>

<div class="counter" id="count">0</div>

<button class="run" onclick="run()">BẤM THÊM</button>
<button class="reset" onclick="reset()">RESET</button>

<script>
// lấy dữ liệu cũ
let count = localStorage.getItem("count") || 0;
count = parseInt(count);
document.getElementById("count").innerText = count;

// mở khi vào app
window.onload = function(){
  run();
}

function run(){
  count++;
  localStorage.setItem("count", count);
  document.getElementById("count").innerText = count;

  window.open(
    "https://6cc.cz?acc=" + count + "&id=" + Date.now(),
    "_blank"
  );
}

function reset(){
  count = 0;
  localStorage.setItem("count", 0);
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
