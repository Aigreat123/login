<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #000, #111);
  color: #fff;
  text-align: center;
}

.container {
  padding: 30px 20px;
}

.logo {
  width: 90px;
  height: 90px;
  border-radius: 20px;
  margin-top: 40px;
  background: #00c853;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
}

h1 {
  font-size: 24px;
  margin-top: 15px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
}

.btn {
  margin-top: 30px;
  padding: 16px;
  width: 90%;
  max-width: 320px;
  font-size: 18px;
  background: #00c853;
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 600;
}

.steps {
  margin-top: 30px;
  text-align: left;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
  font-size: 15px;
  line-height: 1.6;
}

.arrow {
  font-size: 40px;
  margin-top: 20px;
  animation: updown 1s infinite;
}

@keyframes updown {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">DSJ BG</div>

  <h1>Connect</h1>
  <div class="subtitle">Quick setup to access system</div>

  <div class="arrow">⬇️</div>

  <div class="steps">
    ① Tap Share ⬆️ in Safari<br>
    ② Select “Add to Home Screen”<br>
    ③ Tap Add<br><br>
    👉 Then open icon from Home Screen
  </div>

  <button class="btn" onclick="go()">
    🔗 Connect Now
  </button>

</div>

<script>

// 🔥 SỬA LINK TẠI ĐÂY
var TARGET = "https://tra828.tw/h5/#/home";

// Nếu mở từ icon → vào thẳng
if (window.navigator.standalone) {
  window.location.href = TARGET;
}

// MỞ TAB MỚI (KHÔNG ĐÈ TRANG)
function go() {
  window.open(TARGET, '_blank');
}

</script>

</body>
</html>
