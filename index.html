<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool 100% Không Bị Chặn</title>

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:-apple-system;
}

button {
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:15px;
  background:#22c55e;
  color:white;
}

.counter {
  font-size:40px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🚀 Click = 1 Tab (100% không chặn)</h2>

<button onclick="openTab()">BẤM LIÊN TỤC</button>

<div class="counter" id="count">0</div>

<script>
let count = 0;

function openTab(){
  count++;
  document.getElementById("count").innerText = count;

  window.open(
    "https://6cc.cz?id=" + Date.now(),
    "_blank"
  );
}
</script>

</body>
</html>
