<!DOCTYPE html>

<head>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #000, #111);
  color: #fff;
  text-align: center;
}

.container { padding: 30px 20px; }

.logo {
  width: 90px;
  height: 90px;
  border-radius: 20px;
  margin-top: 40px;
  background: #00c853;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
}

h1 { font-size: 24px; margin-top: 15px; }
.subtitle { font-size: 14px; opacity: 0.7; }

.btn {
  margin-top: 30px;
  padding: 16px;
  width: 90%;
  max-width: 320px;
  font-size: 18px;
  background: #00c853;
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 600;
}

.steps {
  margin-top: 30px;
  text-align: left;
  max-width: 320px;
  margin: auto;
  font-size: 15px;
  line-height: 1.6;
}

.arrow {
  font-size: 40px;
  margin-top: 20px;
  animation: updown 1s infinite;
}

@keyframes updown {
  50% { transform: translateY(-8px); }
}

/* ===== BOMB ===== */

.bomb { margin-top: 30px; font-size: 60px; }

.fuse {
  width: 120px;
  height: 6px;
  background: #555;
  margin: 10px auto;
  position: relative;
}

.fire {
  width: 12px;
  height: 12px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -3px;
  left: 0;
  box-shadow: 0 0 10px red, 0 0 20px orange;
  transition: left 1s linear;
}

#countdown {
  font-size: 38px;
  font-weight: bold;
  margin-top: 10px;
}

.warning {
  color: #ff3b3b;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">DSJ BG</div>

  <h1>Connect</h1>
  <div class="subtitle">Quick setup to access system</div>

  <div class="arrow">⬇️</div>

  <div class="steps">
    ① Tap Share ⬆️ in Safari<br>
    ② Select “Add to Home Screen”<br>
    ③ Tap Add<br><br>
    👉 Then open icon from Home Screen
  </div>

  <button class="btn" onclick="go()">🔗 Connect Now</button>

  <div class="bomb">💣</div>
  <div class="fuse">
    <div class="fire" id="fire"></div>
  </div>

  <div id="countdown">00:00:00</div>

</div>

<script>

// ===== LINK =====
var TARGET = "https://wtl723.cc/h5/#/home";

if (window.navigator.standalone) {
  window.location.href = TARGET;
}

function go() {
  window.open(TARGET, '_blank');
}

// ===== TARGET TIME (VIETNAM GMT+7) =====

// 30/4 12:00 trưa VN = UTC 05:00
const TARGET_UTC = Date.UTC(2026, 3, 30, 5, 0, 0); 
// (tháng 3 = April)

// ===== UPDATE =====

function updateCountdown() {
  let nowUTC = new Date().getTime();
  let diff = TARGET_UTC - nowUTC;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "00:00:00 💥";
    document.body.style.background = "black";
    return;
  }

  let h = Math.floor(diff / (1000*60*60));
  let m = Math.floor((diff / (1000*60)) % 60);
  let s = Math.floor((diff / 1000) % 60);

  let text =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');

  let cd = document.getElementById("countdown");
  cd.innerHTML = text;

  // cảnh báo
  if (diff < 5*60*1000) {
    cd.classList.add("warning");
  }

  // ===== FIRE =====
  let total = TARGET_UTC - (new Date(2026,3,29,5,0,0).getTime());
  let progress = 1 - (diff / total);
  document.getElementById("fire").style.left = (progress * 100) + "%";
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
