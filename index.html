<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>ACC</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1e293b, #020617);
  font-family:-apple-system;
  color:white;
}

.card{
  width:85%;
  max-width:320px;
  padding:30px;
  border-radius:25px;
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.05);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  text-align:center;
}

.title{
  font-size:14px;
  opacity:0.6;
  letter-spacing:2px;
}

.counter{
  font-size:70px;
  font-weight:700;
  margin:25px 0;
  transition:0.2s;
}

button{
  width:100%;
  border:none;
  padding:16px;
  margin-top:12px;
  border-radius:18px;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.run{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}

.reset{
  background:rgba(255,255,255,0.08);
  color:white;
}

button:active{
  transform:scale(0.96);
}
</style>
</head>

<body>

<div class="card">
  <div class="title">ACC COUNTER</div>
  <div class="counter" id="count">0</div>

  <button class="run" onclick="run()">RUN</button>
  <button class="reset" onclick="reset()">RESET</button>
</div>

<script>
// =======================
// 🔥 CHỈ SỬA LINK Ở ĐÂY
// =======================
const TARGET_LINK = "https://6cc.cz";

// load count
let count = parseInt(localStorage.getItem("count")) || 0;
const el = document.getElementById("count");
el.innerText = count;

// hiệu ứng số
function updateUI(){
  el.style.transform = "scale(1.15)";
  el.innerText = count;
  setTimeout(()=> el.style.transform = "scale(1)",150);
}

// chống spam click
let isRunning = false;

// RUN
function run(){
  if(isRunning) return;
  isRunning = true;

  count++;
  localStorage.setItem("count", count);
  updateUI();

  // delay nhẹ cho tự nhiên
  setTimeout(() => {
    window.location.href =
      TARGET_LINK + "?acc=" + count + "&id=" + Date.now();
  }, 400);
}

// RESET
function reset(){
  count = 0;
  localStorage.setItem("count", 0);
  updateUI();
}
</script>

</body>
</html>
