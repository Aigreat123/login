<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>ACC</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:-apple-system;
  color:white;
}

.wrap{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.counter{
  font-size:80px;
  font-weight:bold;
  margin-bottom:30px;
}

.tap{
  width:90%;
  height:50vh;
  border-radius:30px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  font-weight:bold;
}

.tap:active{
  transform:scale(0.95);
}
</style>
</head>

<body>

<div class="wrap">
  <div class="counter" id="count">0</div>
  <div class="tap" id="tap">TAP FAST</div>
</div>

<script>
const TARGET_LINK = "https://6cc.cz";

let count = parseInt(localStorage.getItem("count")) || 0;
const el = document.getElementById("count");
el.innerText = count;

const tap = document.getElementById("tap");

let lastClick = 0;

// CLICK chuẩn (quan trọng)
tap.onclick = function(){

  const now = Date.now();

  // tốc độ tối ưu chống block
  if(now - lastClick < 280) return;
  lastClick = now;

  const nextCount = count + 1;
  const url = TARGET_LINK + "?acc=" + nextCount + "&id=" + now;

  // mở tab
  const win = window.open(url, "_blank");

  // chỉ tăng khi KHÔNG bị block
  if(win){
    count = nextCount;
    localStorage.setItem("count", count);
    el.innerText = count;
  }
};
</script>

</body>
</html>
