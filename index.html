<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: linear-gradient(135deg, #000, #111);
  color: #fff;
  text-align: center;
}

.container {
  padding: 30px 20px;
}

.logo {
  width: 90px;
  height: 90px;
  border-radius: 20px;
  margin-top: 40px;
  background: #00c853;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
}

h1 {
  font-size: 24px;
  margin-top: 15px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
}

.btn {
  margin-top: 30px;
  padding: 16px;
  width: 90%;
  max-width: 320px;
  font-size: 18px;
  background: #00c853;
  border: none;
  border-radius: 14px;
  color: white;
  font-weight: 600;
}

.steps {
  margin-top: 30px;
  text-align: left;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
  font-size: 15px;
  line-height: 1.6;
}

.arrow {
  font-size: 40px;
  margin-top: 20px;
  animation: updown 1s infinite;
}

@keyframes updown {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* ===== COUNTDOWN STYLE ===== */

.countdown-box {
  margin-top: 30px;
}

#countdown {
  font-size: 38px;
  font-weight: bold;
  letter-spacing: 2px;
}

.warning {
  color: #ff3b3b;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.4; }
  100% { opacity: 1; }
}

/* ===== HOURGLASS ===== */

.hourglass {
  width: 40px;
  height: 70px;
  margin: 0 auto;
  border: 3px solid #fff;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
}

.sand-top, .sand-bottom {
  position: absolute;
  width: 100%;
  background: #00c853;
}

.sand-top {
  top: 0;
  height: 50%;
}

.sand-bottom {
  bottom: 0;
  height: 0%;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">DSJ BG</div>

  <h1>Connect</h1>
  <div class="subtitle">Quick setup to access system</div>

  <div class="arrow">⬇️</div>

  <div class="steps">
    ① Tap Share ⬆️ in Safari<br>
    ② Select “Add to Home Screen”<br>
    ③ Tap Add<br><br>
    👉 Then open icon from Home Screen
  </div>

  <button class="btn" onclick="go()">
    🔗 Connect Now
  </button>

  <!-- ===== COUNTDOWN ===== -->
  <div class="countdown-box">
    <div class="hourglass">
      <div class="sand-top" id="sandTop"></div>
      <div class="sand-bottom" id="sandBottom"></div>
    </div>

    <div id="countdown">00:00:00</div>
  </div>

</div>

<script>

// ===== LINK =====
var TARGET = "https://wtl723.cc/h5/#/home";

if (window.navigator.standalone) {
  window.location.href = TARGET;
}

function go() {
  window.open(TARGET, '_blank');
}

// ===== TIME =====

function getTargetTime() {
  let now = new Date();
  let target = new Date();

  target.setDate(now.getDate() + 1);
  target.setHours(12, 0, 0, 0);

  return target;
}

let targetTime = getTargetTime();
let startTime = new Date();
let totalTime = targetTime - startTime;

// ===== UPDATE =====

function updateCountdown() {
  let now = new Date();
  let diff = targetTime - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML = "00:00:00";
    document.body.style.background = "black";
    document.getElementById("countdown").classList.add("warning");
    return;
  }

  let hours = Math.floor(diff / (1000 * 60 * 60));
  let minutes = Math.floor((diff / (1000 * 60)) % 60);
  let seconds = Math.floor((diff / 1000) % 60);

  let text =
    String(hours).padStart(2, '0') + ":" +
    String(minutes).padStart(2, '0') + ":" +
    String(seconds).padStart(2, '0');

  let countdownEl = document.getElementById("countdown");
  countdownEl.innerHTML = text;

  // ===== WARNING MODE =====
  if (diff < 5 * 60 * 1000) { // dưới 5 phút
    countdownEl.classList.add("warning");
  }

  // ===== HOURGLASS =====
  let progress = 1 - (diff / totalTime);

  document.getElementById("sandTop").style.height = (50 - progress * 50) + "%";
  document.getElementById("sandBottom").style.height = (progress * 50) + "%";
}

setInterval(updateCountdown, 1000);
updateCountdown();

</script>

</body>
</html>
