<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quick Multi Tab</title>

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:-apple-system;
}

button {
  padding:20px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
}

.counter {
  font-size:35px;
  margin-top:15px;
}
</style>
</head>

<body>

<h2>⚡ Bấm liên tục (không bị văng)</h2>

<button onclick="openTab()">BẤM LIÊN TỤC</button>

<div class="counter" id="count">0</div>

<script>
let count = 0;

function openTab(){
  count++;
  document.getElementById("count").innerText = count;

  const newTab = window.open(
    "https://6cc.cz?id=" + Date.now(),
    "_blank"
  );

  // cố giữ focus ở tool
  setTimeout(() => {
    window.focus();
  }, 50);
}
</script>

</body>
</html>
