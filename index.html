<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>ACC</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:-apple-system;
  color:white;
}

.wrap{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

.counter{
  font-size:80px;
  font-weight:bold;
  margin-bottom:10px;
}

.tap{
  width:90%;
  height:45vh;
  border-radius:30px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  user-select:none;
}

.tap:active{
  transform:scale(0.92);
}

.reset{
  margin-top:12px;
  padding:10px 20px;
  border-radius:12px;
  background:#ef4444;
  font-size:14px;
}

.shortcut{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#2563eb;
  font-size:13px;
  text-align:center;
  width:90%;
  color:white;
  text-decoration:none;
}

.note{
  margin-top:10px;
  font-size:12px;
  opacity:0.6;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="counter" id="count">0</div>

  <div class="tap" id="tap">TAP</div>

  <div class="reset" id="reset">RESET</div>

  <!-- 🔥 iPHONE SHORTCUT -->
  <a class="shortcut"
     href="https://www.icloud.com/shortcuts/be10b969422a45cc95262b25209949c8"
     target="_blank">
     🔥 iPhone: Cài 1 lần → mở 10 ACC nhanh
  </a>

  <div class="note">
    📱 iPhone: bấm trên → Add Shortcut 1 lần<br>
    Sau đó dùng 1 chạm mở 10 tab
  </div>

</div>

<script>

/* =========================
   ⚙️ CONFIG - CHỈ SỬA 1 CHỖ NÀY
   ========================= */
const CONFIG = {
  baseLink: "https://wtl723.cc/h5/#/home"
};
/* ========================= */

let count = parseInt(localStorage.getItem("count")) || 0;
const el = document.getElementById("count");
el.innerText = count;

const tap = document.getElementById("tap");
const resetBtn = document.getElementById("reset");

let lastClick = 0;

/* TAP */
tap.onclick = function(){

  const now = Date.now();
  if(now - lastClick < 280) return;
  lastClick = now;

  const nextCount = count + 1;

  const url = CONFIG.baseLink + "?acc=" + nextCount + "&id=" + now;

  const win = window.open(url, "_blank");

  if(win){
    count = nextCount;
    localStorage.setItem("count", count);
    el.innerText = count;
  }
};

/* RESET */
resetBtn.onclick = function(){
  count = 0;
  localStorage.setItem("count", 0);
  el.innerText = count;
};

</script>

</body>
</html>
