<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>ACC</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:-apple-system;
  color:white;
}

/* full màn hình */
.wrap{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* số */
.counter{
  font-size:80px;
  font-weight:bold;
  margin-bottom:20px;
}

/* vùng bấm lớn */
.tap{
  width:90%;
  height:55vh;
  border-radius:30px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  user-select:none;
}

/* hiệu ứng */
.tap:active{
  transform:scale(0.92);
}

/* hướng dẫn nhỏ */
.note{
  margin-top:15px;
  font-size:13px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="counter" id="count">0</div>
  <div class="tap" id="tap">TAP</div>
  <div class="note">tap → back → tap</div>
</div>

<script>
const TARGET_LINK = "https://6cc.cz";

let count = parseInt(localStorage.getItem("count")) || 0;
const el = document.getElementById("count");
el.innerText = count;

const tap = document.getElementById("tap");

let lastClick = 0;

tap.onclick = function(){

  const now = Date.now();

  // chống bị block
  if(now - lastClick < 280) return;
  lastClick = now;

  const nextCount = count + 1;
  const url = TARGET_LINK + "?acc=" + nextCount + "&id=" + now;

  // mở tab mới
  const win = window.open(url, "_blank");

  if(win){
    count = nextCount;
    localStorage.setItem("count", count);
    el.innerText = count;
  }
};
</script>

</body>
</html>
