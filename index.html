<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cài App</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #000;
  color: #fff;
  text-align: center;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.arrow {
  font-size: 50px;
  animation: updown 1s infinite;
}

@keyframes updown {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

.text {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="overlay" id="overlay">
  <div class="arrow">⬇️</div>
  <div class="text">
    Nhấn nút Share ⬆️<br>
    rồi chọn <b>Add to Home Screen</b><br><br>
    Tự chuyển sau <span id="count">3</span>s...
  </div>
</div>

<script>

// 🔥 LINK
var TARGET = "https://wtl723.cc/h5/#/home";

// nếu mở từ icon → vào thẳng
if (window.navigator.standalone) {
  window.location.href = TARGET;
}

// đếm ngược
let c = 3;
let el = document.getElementById("count");

let timer = setInterval(() => {
  c--;
  el.innerText = c;

  if (c <= 0) {
    clearInterval(timer);
    window.location.href = TARGET;
  }
}, 1000);

</script>

</body>
</html>
