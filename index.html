<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>ACC</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:-apple-system;
  color:white;
}

.wrap{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.counter{
  font-size:80px;
  font-weight:bold;
  margin-bottom:20px;
}

.tap{
  width:90%;
  height:50vh;
  border-radius:30px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
}

.tap:active{
  transform:scale(0.92);
}

.reset{
  margin-top:15px;
  padding:10px 20px;
  border-radius:12px;
  background:#ef4444;
  font-size:14px;
}

.note{
  margin-top:10px;
  font-size:13px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="counter" id="count">0</div>

  <div class="tap" id="tap">TAP</div>

  <div class="reset" id="reset">RESET</div>

  <div class="note">tap → back → tap</div>
</div>

<script>
// 🔥 LINK CHUẨN (GIỮ NGUYÊN)
const BASE_LINK = "https://wtl723.cc/h5/#/home";

let count = parseInt(localStorage.getItem("count")) || 0;
const el = document.getElementById("count");
el.innerText = count;

const tap = document.getElementById("tap");
const resetBtn = document.getElementById("reset");

let lastClick = 0;

// TAP mở tab
tap.onclick = function(){

  const now = Date.now();

  if(now - lastClick < 280) return;
  lastClick = now;

  const nextCount = count + 1;

  // ✅ thêm param SAU dấu #
  const url = BASE_LINK + "?acc=" + nextCount + "&id=" + now;

  const win = window.open(url, "_blank");

  if(win){
    count = nextCount;
    localStorage.setItem("count", count);
    el.innerText = count;
  }
};

// RESET
resetBtn.onclick = function(){
  count = 0;
  localStorage.setItem("count", 0);
  el.innerText = count;
};
</script>

</body>
</html>
