<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>ACC</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:-apple-system;
  color:white;
}

.card{
  width:90%;
  max-width:320px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  text-align:center;
}

.counter{
  font-size:70px;
  font-weight:bold;
  margin:20px 0;
}

button{
  width:100%;
  padding:20px;
  border:none;
  border-radius:20px;
  font-size:22px;
  font-weight:bold;
  background:#22c55e;
  color:white;
}

button:active{
  transform:scale(0.9);
}
</style>
</head>

<body>

<div class="card">
  <div class="counter" id="count">0</div>
  <button id="runBtn">HOLD</button>
</div>

<script>
const TARGET_LINK = "https://6cc.cz";

let count = parseInt(localStorage.getItem("count")) || 0;
const el = document.getElementById("count");
el.innerText = count;

let interval = null;

// giữ tay bắt đầu
document.getElementById("runBtn").addEventListener("touchstart", start);

// thả tay dừng
document.addEventListener("touchend", stop);

// chạy liên tục
function start(){
  if(interval) return;

  interval = setInterval(() => {
    openOne();
  }, 180); // tốc độ tối ưu (đừng thấp hơn kẻo bị block)
}

function stop(){
  clearInterval(interval);
  interval = null;
}

// mở 1 tab = tăng 1 count (CHUẨN 1:1)
function openOne(){
  count++;
  localStorage.setItem("count", count);
  el.innerText = count;

  const url = TARGET_LINK + "?acc=" + count + "&id=" + Date.now();

  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>

</body>
</html>
