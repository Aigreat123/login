```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone full screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- App name -->
<meta name="apple-mobile-web-app-title" content="ACC">

<!-- Apple-style icon -->
<link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">

<title>ACC</title>

<style>
body {
  margin:0;
  background: linear-gradient(180deg, #0f172a, #020617);
  color:white;
  font-family:-apple-system;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* iOS style card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:30px;
  width:80%;
  max-width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  text-align:center;
}

/* counter */
.counter {
  font-size:60px;
  font-weight:bold;
  margin:20px 0;
}

/* buttons */
button {
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  font-size:18px;
  margin-top:10px;
  font-weight:bold;
}

.run {
  background:#22c55e;
  color:white;
}

.reset {
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<div class="card">
  <div class="counter" id="count">0</div>

  <button class="run" onclick="run()">RUN</button>
  <button class="reset" onclick="reset()">RESET</button>
</div>

<script>
// load saved count
let count = parseInt(localStorage.getItem("count") || "0");
document.getElementById("count").innerText = count;

function run(){
  count++;
  localStorage.setItem("count", count);
  document.getElementById("count").innerText = count;

  window.open(
    "https://6cc.cz?acc=" + count + "&id=" + Date.now(),
    "_blank"
  );
}

function reset(){
  count = 0;
  localStorage.setItem("count", 0);
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
