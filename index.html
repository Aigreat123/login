<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mobile Tool</title>

<style>
body {
  background:#0f172a;
  color:white;
  text-align:center;
  font-family:-apple-system;
}

button {
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  margin:10px;
}

iframe {
  width:100%;
  height:80vh;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📱 Tool điện thoại (không bị chặn)</h2>

<button onclick="loadPage()">Chạy</button>

<div id="count">0</div>

<iframe id="frame"></iframe>

<script>
let count = 0;

function loadPage(){
  count++;
  document.getElementById("count").innerText = count;

  document.getElementById("frame").src =
    "https://6cc.cz?id=" + Date.now();
}
</script>

</body>
</html>
